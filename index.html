<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrLinkSaverManEvil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --matrix-green: #00ff41;
            --dark-green: #003b00;
            --text-color: #a0ffa0;
            --border-style: 1px solid #00ff41;
        }

        /* CENTERED BOX LAYOUT */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            border: var(--border-style);
            padding: 20px;
            box-shadow: 0 0 15px var(--dark-green);
            background-color: #050505;
            box-sizing: border-box;
            overflow-y: auto; 
        }

        .container::-webkit-scrollbar {
            width: 6px;
        }
        .container::-webkit-scrollbar-track {
            background: #000;
        }
        .container::-webkit-scrollbar-thumb {
            background: var(--dark-green);
            border: 1px solid var(--matrix-green);
        }

        h1, h2 {
            color: var(--matrix-green);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
        }

        #login-screen {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input, textarea, select {
            background-color: #000;
            border: var(--border-style);
            color: var(--matrix-green);
            padding: 10px;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            box-shadow: 0 0 8px var(--matrix-green);
        }

        button {
            background-color: var(--dark-green);
            color: var(--matrix-green);
            border: var(--border-style);
            padding: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
        }

        button:hover {
            background-color: var(--matrix-green);
            color: #000;
        }

        #dashboard {
            display: none;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: var(--border-style);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
        }

        .tab-btn.active {
            background-color: var(--matrix-green);
            color: #000;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            padding: 10px;
            border: 1px dashed var(--matrix-green);
        }

        .card {
            border: var(--border-style);
            padding: 10px;
            margin-bottom: 10px;
            background: #111;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            color: var(--matrix-green);
        }

        .card-body {
            display: none;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed var(--dark-green);
            word-break: break-all;
        }

        .card-body a {
            color: #00ffff;
            text-decoration: none;
        }

        .card-body a:hover {
            text-decoration: underline;
        }

        .actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .error {
            color: #ff3333;
            text-align: center;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h1>// MrLinkSaverManEvil</h1>
        <input type="text" id="username" placeholder="ENTER USERNAME">
        <input type="password" id="password" placeholder="ENTER PASSWORD">
        <button onclick="login()">INITIALIZE CLOUD LOGIN</button>
        <p id="login-error" class="error"></p>
    </div>

    <div id="dashboard">
        <div class="user-info">
            <span>USER: <span id="current-user" style="color:var(--matrix-green)"></span></span>
            <button onclick="logout()" style="padding: 2px 10px; font-size: 0.8em;">LOGOUT</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('notes')">NOTES</button>
            <button class="tab-btn" onclick="switchTab('meetings')">MEETINGS</button>
            <button class="tab-btn" onclick="switchTab('assignments')">ASSIGNMENTS</button>
        </div>

        <div id="notes" class="tab-content active">
            <div class="input-group">
                <textarea id="note-text" placeholder="Type cloud note here..." rows="3"></textarea>
                <button onclick="addItem('notes')">SAVE TO CLOUD</button>
            </div>
            <div id="notes-list">SYNCING...</div>
        </div>

        <div id="meetings" class="tab-content">
            <div class="input-group">
                <input type="text" id="meet-title" placeholder="Meeting Title">
                <input type="text" id="meet-link" placeholder="Paste Link Here">
                <button onclick="addItem('meetings')">SAVE TO CLOUD</button>
            </div>
            <div id="meetings-list">SYNCING...</div>
        </div>

        <div id="assignments" class="tab-content">
            <div class="input-group">
                <input type="text" id="assign-title" placeholder="Assignment Title">
                <input type="text" id="assign-link" placeholder="Paste Link Here">
                <textarea id="assign-instruction" placeholder="Instructions/Notes..." rows="2"></textarea>
                <button onclick="addItem('assignments')">SAVE TO CLOUD</button>
            </div>
            <div id="assignments-list">SYNCING...</div>
        </div>
    </div>
</div>

<script>
    (function() {
        // Safe Key Configuration Using Your Fresh Keys
        const URL = "https://rivjymdnsxgpdilqqpvu.supabase.co";
        const KEY = "sb_publishable_kY3--vsG69shv2nt6bS3Xw_WhfPWcfN";

        // Initialize Supabase Client
        window.supabase = supabase.createClient(URL, KEY);
    })();

    const credentials = { 'user1': 'admin', 'user2': 'admin2' };
    let currentUser = '';
    let cloudItems = [];

    // --- LOGIN ---
    function login() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();

        if (credentials[user] && credentials[user] === pass) {
            currentUser = user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('current-user').innerText = user.toUpperCase();
            
            fetchData(); 
        } else {
            document.getElementById('login-error').innerText = "INVALID CREDENTIALS.";
        }
    }

    function logout() {
        currentUser = '';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
    }

    // --- DATABASE OPERATIONS ---
    async function fetchData() {
        const { data, error } = await window.supabase
            .from('link_saver')
            .select('*')
            .eq('username', currentUser)
            .order('created_at', { ascending: false });

        if (!error) {
            cloudItems = data;
            renderAll();
        } else {
            console.error("Error pulling database items:", error);
        }
    }

    async function addItem(category) {
        let payload = { username: currentUser, category: category };

        if (category === 'notes') {
            const txt = document.getElementById('note-text').value.trim();
            if(!txt) return;
            payload.notes = txt;
            document.getElementById('note-text').value = '';
        } 
        else if (category === 'meetings') {
            const title = document.getElementById('meet-title').value.trim();
            const link = document.getElementById('meet-link').value.trim();
            if(!title || !link) return;
            payload.title = title;
            payload.link = link;
            document.getElementById('meet-title').value = '';
            document.getElementById('meet-link').value = '';
        } 
        else if (category === 'assignments') {
            const title = document.getElementById('assign-title').value.trim();
            const link = document.getElementById('assign-link').value.trim();
            const notes = document.getElementById('assign-instruction').value.trim();
            if(!title || !link) return;
            payload.title = title;
            payload.link = link;
            payload.notes = notes;
            document.getElementById('assign-title').value = '';
            document.getElementById('assign-link').value = '';
            document.getElementById('assign-instruction').value = '';
        }

        const { error } = await window.supabase.from('link_saver').insert([payload]);
        if (!error) fetchData(); 
    }

    async function deleteItem(id) {
        const { error } = await window.supabase.from('link_saver').delete().eq('id', id);
        if (!error) fetchData();
    }

    // --- UI DISPLAY ENGINE ---
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        
        const activeBtn = Array.from(document.querySelectorAll('.tab-btn')).find(btn => btn.innerText.toLowerCase() === tabId);
        if (activeBtn) activeBtn.classList.add('active');
    }

    function toggleCard(id) {
        const body = document.getElementById(id);
        body.style.display = body.style.display === 'block' ? 'none' : 'block';
    }

    function renderAll() {
        const notesList = document.getElementById('notes-list');
        const meetsList = document.getElementById('meetings-list');
        const assignsList = document.getElementById('assignments-list');

        notesList.innerHTML = ''; meetsList.innerHTML = ''; assignsList.innerHTML = '';

        cloudItems.forEach(item => {
            if (item.category === 'notes') {
                notesList.innerHTML += `
                    <div class="card">
                        <div class="card-header" onclick="toggleCard('body-${item.id}')">
                            <span>📝 ${item.notes.substring(0, 25)}...</span>
                        </div>
                        <div id="body-${item.id}" class="card-body">
                            <p style="white-space: pre-wrap;">${item.notes}</p>
                            <div class="actions"><button onclick="deleteItem(${item.id})">DELETE</button></div>
                        </div>
                    </div>`;
            } 
            else if (item.category === 'meetings') {
                meetsList.innerHTML += `
                    <div class="card">
                        <div class="card-header" onclick="toggleCard('body-${item.id}')">
                            <span>📹 ${item.title}</span>
                        </div>
                        <div id="body-${item.id}" class="card-body">
                            <p>Link: <a href="${item.link}" target="_blank">${item.link}</a></p>
                            <div class="actions"><button onclick="deleteItem(${item.id})">DELETE</button></div>
                        </div>
                    </div>`;
            } 
            else if (item.category === 'assignments') {
                assignsList.innerHTML += `
                    <div class="card">
                        <div class="card-header" onclick="toggleCard('body-${item.id}')">
                            <span>📚 ${item.title}</span>
                        </div>
                        <div id="body-${item.id}" class="card-body">
                            <p>Link: <a href="${item.link}" target="_blank">${item.link}</a></p>
                            <p><strong>Task Note:</strong> ${item.notes || 'None'}</p>
                            <div class="actions"><button onclick="deleteItem(${item.id})">DELETE</button></div>
                        </div>
                    </div>`;
            }
        });
    }
</script>
</body>
</html>
